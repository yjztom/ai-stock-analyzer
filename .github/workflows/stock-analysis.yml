name: Stock Analysis

# 触发方式：
#  1) 定时（cron 用 UTC 时间）：
#     - "0 8  * * 1-5" = 北京 16:00，A股/港股收盘后
#     - "0 21 * * 1-5" = 北京次日 05:00，美股收盘后
#     单 cron 覆盖不全，这里用双 cron 兼顾两个时区收盘。
#  2) 手动触发（Actions 页点 Run workflow），便于调试。
on:
  schedule:
    - cron: "0 8 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

# 允许工作流写回仓库（提交报告）
permissions:
  contents: write

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖（本项目零依赖，仅当 requirements 有内容时才装）
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ] && grep -qvE '^\s*#|^\s*$' requirements.txt; then
            pip install -r requirements.txt
          else
            echo "无第三方依赖，跳过安装"
          fi

      - name: 运行测试
        run: python -m unittest discover -s tests -v

      - name: 运行分析并生成报告
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 提交报告回仓库（供 GitHub Pages 展示）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/reports data/signals
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 更新股票分析报告 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
