<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 股票分析日报</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <h1>📈 AI 股票分析日报</h1>
      <p class="sub" id="subtitle">加载中…</p>
    </div>
  </header>

  <main class="wrap">
    <!-- 数据来源提示（仿真数据时显示） -->
    <div id="banner" class="banner hidden"></div>

    <!-- 概览统计卡 -->
    <section class="stats" id="stats"></section>

    <!-- Top 偏多 / 偏空 -->
    <section class="tops">
      <div class="top-card bull">
        <h2>🔴 偏多 Top</h2>
        <ol id="top-bull"></ol>
      </div>
      <div class="top-card bear">
        <h2>🟢 偏空 Top</h2>
        <ol id="top-bear"></ol>
      </div>
    </section>

    <!-- 过滤器 -->
    <section class="toolbar">
      <div class="filters" id="market-filters"></div>
      <input type="search" id="search" placeholder="搜索代码 / 名称…" />
    </section>

    <!-- 明细表 -->
    <section class="table-wrap">
      <table id="grid">
        <thead>
          <tr>
            <th>名称</th><th>代码</th><th>市场</th>
            <th class="num">现价</th><th class="num">涨跌%</th>
            <th class="num">评分</th><th>信号</th>
            <th class="num">RSI</th><th class="num">KDJ(J)</th>
            <th>走势(近60日)</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <!-- 明细弹层 -->
    <div id="modal" class="modal hidden">
      <div class="modal-box">
        <button class="close" id="modal-close">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>
  </main>

  <footer class="foot wrap">
    <p>⚠️ 本页所有内容均为技术形态的客观描述，<b>仅供学习，不构成任何投资建议</b>。数据源 Yahoo Finance，可能延迟或不准确。</p>
    <p class="muted" id="gen-time"></p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
